apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      namespace: chat-app
      labels:
        app: backend
    spec:
      containers:
      - name: chatapp-backend
        image: anirek/chat-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: production
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: mongo-uri
        - name: MONGO_DB_URL
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: mongo-uri
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: mongo-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: jwt
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: jwt
        - name: PORT
          value: "5000"
